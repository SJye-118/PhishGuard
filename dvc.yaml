# ═════════════════════════════════════════════════════════════════
# PhishGuard Enterprise — DVC Pipeline Definition
#
# Run the full pipeline:    dvc repro
# Run a single stage:       dvc repro fetch_tranco
# Check what will re-run:   dvc status
# Pull tracked data:        dvc pull
# View lineage graph:       dvc dag
#
# Stage execution notes:
#   - All commands use `python -m <module>` so Python adds the
#     project root to sys.path, enabling `from scripts._common import`
#   - Run all commands from the project root directory
#   - DVC tracks inputs (deps) and outputs (outs) with checksums
#   - Stages only re-run when their deps or params change
# ═════════════════════════════════════════════════════════════════
stages:

  # ── Phase 2: Data Sourcing ─────────────────────────────────────
  fetch_tranco:
    desc: >
      Download the Tranco Top-1M domain list (benign training class).
      Output: data/raw/tranco_raw.csv with header row rank,domain.
      Minimum 900,000 rows asserted before saving.
    cmd: python -m scripts.fetch_tranco
    deps:
      - scripts/fetch_tranco.py
      - scripts/_common.py
    outs:
      - data/raw/tranco_raw.csv:
          cache: true
          desc: "Tranco Top-1M domain list — benign training baseline (label 0)"

  fetch_phishtank:
    desc: >
      Download the PhishTank verified phishing feed (malicious training class).
      Output: data/raw/phishtank_raw.json — array of verified+online entries.
      Minimum 20,000 entries asserted before saving.
      Falls back to OpenPhish if PhishTank is unavailable.
    cmd: python -m scripts.fetch_phishtank
    deps:
      - scripts/fetch_phishtank.py
      - scripts/_common.py
    outs:
      - data/raw/phishtank_raw.json:
          cache: true
          desc: "PhishTank verified phishing URLs — malicious training class (label 1)"

  # ── Phase 3: Dataset Normalisation ────────────────────────────
  normalize:
    desc: >
      Normalise and merge Tranco and PhishTank data into a balanced,
      label-annotated dataset. Strips paths from PhishTank URLs to
      enforce structural equity (domain-only classifier). Asserts
      zero duplicates and zero intersection between label sets.
    cmd: python -m phishguard.ml.normalize
    deps:
      - phishguard/ml/normalize.py
      - data/raw/tranco_raw.csv
      - data/raw/phishtank_raw.json
    outs:
      - data/processed/dataset_raw.csv:
          cache: true
          desc: "Balanced domain-only dataset with binary labels (0=benign, 1=malicious)"
    params:
      - params.yaml:
          - data.label_benign
          - data.label_malicious
          - data.min_rows_tranco
          - data.min_rows_phishtank

  # ── Phase 4: Feature Engineering ──────────────────────────────
  extract_features:
    desc: >
      Extract 15 structural and semantic features from each domain string.
      All features are numerical or boolean. Zero NaN values permitted
      in the output matrix.
    cmd: python -m phishguard.ml.features
    deps:
      - phishguard/ml/features.py
      - data/processed/dataset_raw.csv
    outs:
      - data/features/features_extracted.csv:
          cache: true
          desc: "15-feature numerical matrix ready for model training"

  # ── Phase 5: Train/Test Split ─────────────────────────────────
  split:
    desc: >
      Split the feature matrix into stratified train/test partitions
      using a time-aware ordering to simulate zero-day detection.
    cmd: python -m phishguard.ml.split
    deps:
      - phishguard/ml/split.py
      - data/features/features_extracted.csv
    outs:
      - data/features/train.csv:
          cache: true
      - data/features/test.csv:
          cache: true
    params:
      - params.yaml:
          - split.test_size
          - split.random_state

  # ── Phase 5: Model Training ────────────────────────────────────
  train:
    desc: >
      Train a RandomForestClassifier on the training split.
      Serialise the model to artefacts/phishguard_model.joblib.
    cmd: python -m phishguard.ml.train
    deps:
      - phishguard/ml/train.py
      - data/features/train.csv
    outs:
      - artefacts/phishguard_model.joblib:
          cache: true
          desc: "Trained scikit-learn RandomForestClassifier"
    params:
      - params.yaml:
          - model.algorithm
          - model.n_estimators
          - model.max_depth
          - model.min_samples_leaf
          - model.class_weight
          - model.random_state

  # ── Phase 5: Model Evaluation ─────────────────────────────────
  evaluate:
    desc: >
      Evaluate the trained model on the held-out test split.
      Write precision, recall, F1, and ROC-AUC to metrics/metrics.json.
      CI compares these metrics against promotion_gates in params.yaml.
    cmd: python -m phishguard.ml.evaluate
    deps:
      - phishguard/ml/evaluate.py
      - data/features/test.csv
      - artefacts/phishguard_model.joblib
    metrics:
      - metrics/metrics.json:
          cache: false
    params:
      - params.yaml:
          - promotion_gates.min_precision
          - promotion_gates.min_recall