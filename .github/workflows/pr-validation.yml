# ═════════════════════════════════════════════════════════════════
# PhishGuard Enterprise — PR Validation Pipeline
#
# Triggers: Every pull request to main or staging, and every push to main.
#
# Jobs:
#   lint        → Ruff linting + Black formatting check
#   type-check  → mypy static type analysis
#   test        → pytest unit + integration tests with coverage gate
#   security    → bandit SAST + safety dependency CVE check
#
# ALL JOBS must pass before a PR can be merged.
# ═════════════════════════════════════════════════════════════════
name: PR Validation

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main

# Cancel in-flight runs for the same PR/branch to save Actions minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint and Format Check ──────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff black

      - name: Run Ruff linter
        run: ruff check phishguard/ tests/ scripts/

      - name: Run Black format check
        run: black --check phishguard/ tests/ scripts/

  # ── Static Type Checking ───────────────────────────────────────
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy phishguard/ --ignore-missing-imports

  # ── Unit and Integration Tests ─────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    services:
      # Redis service container for integration tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install all dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite with coverage
        run: |
          pytest tests/ \
            --cov=phishguard \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v
        env:
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: development
          LOG_LEVEL: WARNING   # Reduce test output noise
          MODEL_PATH: ./artefacts/phishguard_model.joblib

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Security Analysis ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit SAST scan
        # -r : recursive  |  -ll : report HIGH and MEDIUM severity
        # Exclude tests — assert statements are intentional
        run: bandit -r phishguard/ -ll --exclude phishguard/ml/train.py

      - name: Run Safety dependency CVE check
        run: safety check -r requirements.txt

      - name: Scan for secrets in repository
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified