# ─────────────────────────────────────────────────────────────────
# PhishGuard Enterprise — Pre-commit Hooks
# Runs automatically before every git commit.
# Install with: pre-commit install
# ─────────────────────────────────────────────────────────────────
repos:
  # ── Standard file hygiene ─────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements          # Catches forgotten breakpoint() / pdb
      - id: detect-private-key        # Blocks accidental secret commits

  # ── Black (formatting) ────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11

  # ── Ruff (linting) ───────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]      # Auto-fix safe issues
      - id: ruff-format

  # ── mypy (type checking) ──────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7.0
          - pydantic-settings>=2.3.0
          - fastapi>=0.111.0

  # ── Bandit (security SAST) ────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-r", "phishguard/", "-ll"]   # Report HIGH and above only
        exclude: tests/